<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — Alapan Das</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #f8f6f1; --ink: #1c1c1a; --muted: #6b6b63; --accent: #3a5a8c; --accent-light: #e8eef5; --line: #e0ddd6; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--ink); font-size: 16px; line-height: 1.75; font-weight: 300; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 3rem; background: rgba(248,246,241,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); }
    .nav-name { font-family: 'EB Garamond', serif; font-size: 1.25rem; color: var(--ink); text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.82rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }
    main { max-width: 780px; margin: 0 auto; padding: 7rem 2rem 5rem; }
    .page-header { margin-bottom: 3.5rem; opacity: 0; animation: fadeUp 0.7s ease 0.2s forwards; }
    .page-header h1 { font-family: 'EB Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 400; line-height: 1.08; margin-bottom: 0.4rem; }
    .page-header .subtitle { font-size: 0.9rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); }
    .divider { height: 1px; background: var(--line); margin: 2.5rem 0; }
    .placeholder-box { opacity: 0; animation: fadeUp 0.7s ease 0.4s forwards; border: 1px dashed var(--line); border-radius: 4px; padding: 4rem 2rem; text-align: center; }
    .placeholder-box p { color: var(--muted); font-size: 0.95rem; margin-bottom: 0.5rem; }
    .placeholder-box .coming { font-family: 'EB Garamond', serif; font-size: 1.6rem; color: var(--ink); margin-bottom: 1rem; }
    .back-link { display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 2rem; font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
    .back-link:hover { border-color: var(--accent); }
    footer { max-width: 780px; margin: 0 auto; padding: 2rem; font-size: 0.8rem; color: var(--muted); border-top: 1px solid var(--line); display: flex; justify-content: space-between; }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) { nav { padding: 1rem 1.25rem; } .nav-links { gap: 1.2rem; } }
  </style>
</head>
<body>
  <nav>
    <a class="nav-name" href="index.html">Alapan Das</a>
    <ul class="nav-links">
      <li><a href="about.html">About</a></li>

      <li><a href="photography.html">Photography</a></li>
      <li><a href="diary.html">Diary</a></li>
    </ul>
  </nav>
  <main>
    <div class="page-header">
      <p class="subtitle">Alapan Das</p>
      <h1>About</h1>
    </div>
    <div class="divider"></div>
    <div class="placeholder-box">
      <p class="coming">Coming soon</p>
      <p>A more detailed introduction is on its way.</p>
      <a class="back-link" href="index.html">← Back to home</a>
    </div>
  </main>
  <footer>
    <span>© 2026 Alapan Das</span>
    <a href="mailto:adas2001.suri@gmail.com">adas2001.suri@gmail.com</a>
  </footer>
</body>
</html>
